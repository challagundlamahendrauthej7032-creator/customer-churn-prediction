<!DOCTYPE html>
<html>
<head>
    <title>Customer Churn Prediction</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial;
            min-height: 100vh;
            background: linear-gradient(-45deg, #4e73df, #1cc88a, #36b9cc, #e74a3b);
            background-size: 400% 400%;
            animation: gradient 8s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: white;
            padding: 35px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #4e73df;
            margin-bottom: 20px;
            font-size: 24px;
        }

        label {
            font-weight: bold;
            color: #333;
            display: block;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #4e73df;
        }

        .sample-btn {
            width: 100%;
            padding: 10px;
            background: #f0f0f0;
            border: 1px dashed #4e73df;
            border-radius: 8px;
            color: #4e73df;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .sample-btn:hover { background: #e8ecff; }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #4e73df;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button[type="submit"]:hover { background: #2e59d9; }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid white;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #4e73df;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📊 Customer Churn Prediction</h2>

        <button class="sample-btn" onclick="fillSample()">
            🎯 Fill Sample Values
        </button>

        <form method="POST" action="https://customer-churn-prediction-gbd6.onrender.com/" onsubmit="showSpinner()">

            <label>Tenure (months)</label>
            <input type="number" name="Tenure" id="Tenure"
                   value="{{ request.form.get('Tenure', '') }}"
                   placeholder="e.g. 24" required>

            <label>Age</label>
            <input type="number" name="Age" id="Age"
                   value="{{ request.form.get('Age', '') }}"
                   placeholder="e.g. 35" required>

            <label>Gender</label>
            <select name="Gender" id="Gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <label>Location</label>
            <select name="Location" id="Location">
                <option value="Urban">Urban</option>
                <option value="Suburban">Suburban</option>
                <option value="Rural">Rural</option>
            </select>

            <label>Contract Type</label>
            <select name="ContractType" id="ContractType">
                <option value="Month-to-month">Month-to-month</option>
                <option value="One year">One year</option>
                <option value="Two years">Two years</option>
            </select>

            <label>Payment Method</label>
            <select name="PaymentMethod" id="PaymentMethod">
                <option value="Electronic check">Electronic check</option>
                <option value="Credit card">Credit card</option>
                <option value="Mailed check">Mailed check</option>
                <option value="Bank transfer">Bank transfer</option>
            </select>

            <label>Monthly Charges</label>
            <input type="number" name="MonthlyCharges" id="MonthlyCharges"
                   value="{{ request.form.get('MonthlyCharges', '') }}"
                   placeholder="e.g. 65" step="0.1" required>

            <label>Total Charges</label>
            <input type="number" name="TotalCharges" id="TotalCharges"
                   value="{{ request.form.get('TotalCharges', '') }}"
                   placeholder="e.g. 1500" step="0.1" required>

            <label>Avg Monthly Usage (GB)</label>
            <input type="number" name="AvgMonthlyUsageGB" id="AvgMonthlyUsageGB"
                   value="{{ request.form.get('AvgMonthlyUsageGB', '') }}"
                   placeholder="e.g. 20" step="0.1" required>

            <label>Support Calls</label>
            <input type="number" name="NumSupportCalls" id="NumSupportCalls"
                   value="{{ request.form.get('NumSupportCalls', '') }}"
                   placeholder="e.g. 2" required>

            <label>App Logins</label>
            <input type="number" name="NumAppLogins" id="NumAppLogins"
                   value="{{ request.form.get('NumAppLogins', '') }}"
                   placeholder="e.g. 10" required>

            <label>Days Since Last Login</label>
            <input type="number" name="TimeSinceLastLogin_Days" id="TimeSinceLastLogin_Days"
                   value="{{ request.form.get('TimeSinceLastLogin_Days', '') }}"
                   placeholder="e.g. 5" required>

            <label>Late Payments</label>
            <input type="number" name="NumLatePayments" id="NumLatePayments"
                   value="{{ request.form.get('NumLatePayments', '') }}"
                   placeholder="e.g. 1" required>

            <label>Failed Payments</label>
            <input type="number" name="FailedPayments" id="FailedPayments"
                   value="{{ request.form.get('FailedPayments', '') }}"
                   placeholder="e.g. 0" required>

            <label>Auto Pay Enabled</label>
            <select name="AutoPayEnabled" id="AutoPayEnabled">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>

            <label>Complaints</label>
            <input type="number" name="NumComplaints" id="NumComplaints"
                   value="{{ request.form.get('NumComplaints', '') }}"
                   placeholder="e.g. 1" required>

            <label>Avg Ticket Resolution Hours</label>
            <input type="number" name="AvgTicketResolution_Hours" id="AvgTicketResolution_Hours"
                   value="{{ request.form.get('AvgTicketResolution_Hours', '') }}"
                   placeholder="e.g. 24" step="0.1" required>

            <label>Satisfaction Score (1-5)</label>
            <input type="number" name="SatisfactionScore" id="SatisfactionScore"
                   value="{{ request.form.get('SatisfactionScore', '') }}"
                   placeholder="e.g. 3" min="1" max="5" required>

            <button type="submit">
                <span id="btn-text">🔍 Predict</span>
                <div class="spinner" id="spinner"></div>
            </button>
        </form>

        <div class="result">
            {{ prediction_text }}
        </div>
    </div>

    <script>
        function fillSample() {
            document.getElementById('Tenure').value = '24';
            document.getElementById('Age').value = '35';
            document.getElementById('MonthlyCharges').value = '65';
            document.getElementById('TotalCharges').value = '1500';
            document.getElementById('AvgMonthlyUsageGB').value = '20';
            document.getElementById('NumSupportCalls').value = '2';
            document.getElementById('NumAppLogins').value = '10';
            document.getElementById('TimeSinceLastLogin_Days').value = '5';
            document.getElementById('NumLatePayments').value = '1';
            document.getElementById('FailedPayments').value = '0';
            document.getElementById('NumComplaints').value = '1';
            document.getElementById('AvgTicketResolution_Hours').value = '24';
            document.getElementById('SatisfactionScore').value = '3';
        }

        function showSpinner() {
            document.getElementById('btn-text').style.display = 'none';
            document.getElementById('spinner').style.display = 'block';
        }
    </script>
</body>
</html>
